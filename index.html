<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>hardwarehub-inventory-management</title>
  </head>
  <body>
    <div id="app">
      <div class="d-flex" id="wrapper">
        <div class="bg-dark text-white p-3 vh-100 flex-shrink-0" id="sidebar-wrapper" style="width: 260px; position: sticky; top: 0;">
          <div class="d-flex align-items-center mb-4 me-md-auto text-white text-decoration-none">
            <i class="bi bi-cpu-fill fs-3 me-2 text-primary"></i>
            <span class="fs-4 fw-bold">HardwareHub</span>
          </div>
          <hr>
          <ul class="nav nav-pills flex-column mb-auto gap-2" id="nav-links">
            <li class="nav-item">
              <a href="#" class="nav-link text-white active" data-page="dashboard">
                <i class="bi bi-speedometer2 me-2"></i> Javítási Napló
              </a>
            </li>
            <li>
              <a href="#" class="nav-link text-white" data-page="raktar">
                <i class="bi bi-box-seam me-2"></i> Raktárkészlet
              </a>
            </li>
            <li>
              <a href="#" class="nav-link text-white" data-page="adatfelvetel">
                <i class="bi bi-plus-circle me-2"></i> Adatfelvétel
              </a>
            </li>
          </ul>
          <hr>
          <div class="text-muted small">v1.0.0 - Bence & Thao</div>
        </div>

        <div id="page-content-wrapper" class="w-100 bg-light overflow-auto p-4">
          
          <div id="page-dashboard" class="page-section">
            <h1 class="h2 mb-3">Javítási Napló (Dashboard)</h1>
            <p class="text-muted">A folyamatban lévő munkák listája és szűrése.</p>
            </div>

          <div id="page-raktar" class="page-section d-none">
            <h1 class="h2 mb-3">Raktárkészlet</h1>
            <p class="text-muted">Elérhető alkatrészek és készlethiány riasztások.</p>
            </div>

          <div id="page-adatfelvetel" class="page-section d-none">
            <h1 class="h2 mb-3">Új Adatok Rögzítése</h1>
            <p class="text-muted">Szervizigények és új raktári tételek hozzáadása.</p>
            </div>

        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
